<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnStory</title>
  <style>
    html,
    body {
      background: black;
      color: #a6b962;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #text-container {
      font-family: monospace;
      height: 100%;
      overflow: scroll;
      position: absolute;
      bottom: 0rem;
      left:50%;
      transform: translate(-50%, 0%);
      width: 60%;
      cursor: text;
      min-width: 50rem;
      user-select: none;
    }
  </style>

</head>


<body>
  <div
    id="text-container">
    Hello, we are developers of the game  "Mia - The Heart Way."
  </div>

</body>
</html>
